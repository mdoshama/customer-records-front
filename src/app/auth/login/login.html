<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">

      <div class="card border-0 shadow">

        <div class="card-header bg-primary text-white text-center py-4">
          <h3 class="mb-0 fw-bold">
            <i class="bi bi-shield-lock me-2"></i>Admin Panel
          </h3>
          <small class="opacity-75">Authorized Personnel Only</small>
        </div>

        <div class="card-body p-4">

          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">
                <i class="bi bi-person me-1"></i>Username
              </label>
              <input
                id="username"
                type="text"
                class="form-control form-control-lg"
                [class.is-invalid]="username.invalid && username.touched"
                [class.is-valid]="username.valid && username.touched"
                formControlName="username"
                placeholder="Enter your username"
                autocomplete="username"
              />
              <div class="invalid-feedback">
                <span [hidden]="!username.hasError('required')">Username is required.</span>
                <span [hidden]="!username.hasError('minlength')">Minimum 3 characters required.</span>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">
                <i class="bi bi-lock me-1"></i>Password
              </label>
              <div class="input-group input-group-lg">
                <input
                  id="password"
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  [class.is-invalid]="password.invalid && password.touched"
                  [class.is-valid]="password.valid && password.touched"
                  formControlName="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                />
                <button type="button" class="btn btn-outline-secondary" (click)="togglePassword()">
                  <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
                <div class="invalid-feedback">
                  <span [hidden]="!password.hasError('required')">Password is required.</span>
                  <span [hidden]="!password.hasError('minlength')">Minimum 6 characters required.</span>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember" formControlName="remember" />
                <label class="form-check-label text-muted" for="remember">Remember me</label>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
              </button>
            </div>

            <div class="alert  d-flex align-items-center" role="alert" [hidden]="!errorMessage">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <span>{{ errorMessage }}</span>
            </div>

          </form>
        </div>

        <div class="card-footer text-center text-muted py-3 bg-light">
          <small>
            <i class="bi bi-info-circle me-1"></i>
            User accounts are managed exclusively by admins.
          </small>
        </div>

      </div>
    </div>
  </div>
</div>
